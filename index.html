<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF to Markdown</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1d1d1f;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }

    .toolbar {
      display: flex;
      gap: 10px;
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      align-items: center;
    }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    button:hover:not(:disabled) { opacity: 0.85; }

    .btn-primary { background: #0071e3; color: #fff; }
    .btn-success { background: #34c759; color: #fff; }
    .btn-neutral { background: #e5e5ea; color: #1d1d1f; }
    .btn-danger { background: #ff3b30; color: #fff; }

    #status {
      margin-left: auto;
      font-size: 13px;
      color: #6e6e73;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 240px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6e6e73;
      padding: 12px 16px 8px;
    }
    #file-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
    }
    #file-list li {
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #f2f2f7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #file-list li:hover { background: #f5f5f7; }
    #file-list li.active { background: #e8f0fe; }
    #file-list li .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #c7c7cc;
    }
    #file-list li.done .dot { background: #34c759; }
    #file-list li.error .dot { background: #ff3b30; }

    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1e1e2e;
    }
    .preview-header {
      padding: 10px 20px;
      font-size: 12px;
      color: #888;
      background: #16161e;
      border-bottom: 1px solid #2a2a3e;
    }
    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      font-family: "Courier New", monospace;
      font-size: 13px;
      line-height: 1.7;
      color: #cdd6f4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #preview.placeholder { color: #555; font-style: italic; font-family: inherit; }

    .drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,113,227,0.15);
      border: 3px dashed #0071e3;
      z-index: 100;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #0071e3;
      font-weight: 600;
    }
    .drop-overlay.active { display: flex; }

    #file-input { display: none; }
  </style>
</head>
<body>

<div class="drop-overlay" id="drop-overlay">Drop PDFs here</div>
<input type="file" id="file-input" accept=".pdf" multiple />

<header>
  <h1>PDF to Markdown</h1>
</header>

<div class="toolbar">
  <button class="btn-primary" onclick="document.getElementById('file-input').click()">+ Add PDF</button>
  <button class="btn-neutral" id="btn-convert" onclick="convertAll()" disabled>Convert All</button>
  <button class="btn-success" id="btn-save" onclick="saveCurrent()" disabled>Save Markdown</button>
  <button class="btn-success" id="btn-save-all" onclick="saveAll()" disabled>Save All</button>
  <span id="status">Add PDF files to get started.</span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">Files</div>
    <ul id="file-list"></ul>
    <div style="padding: 8px 10px; border-top: 1px solid #e0e0e0;">
      <button class="btn-danger" id="btn-clear" onclick="clearFiles()" disabled style="width:100%; padding:7px 10px; font-size:13px;">Clear All Files</button>
    </div>
  </div>
  <div class="preview-panel">
    <div class="preview-header" id="preview-header">No file selected</div>
    <div id="preview" class="placeholder">Select a file and click Convert All to see the markdown preview.</div>
  </div>
</div>

<script>
  const files = [];       // {name, data (base64), markdown, status}
  let selected = -1;

  // ── File input ────────────────────────────────────────────────────
  document.getElementById("file-input").addEventListener("change", e => {
    addFiles([...e.target.files]);
    e.target.value = "";
  });

  document.addEventListener("dragover", e => {
    e.preventDefault();
    document.getElementById("drop-overlay").classList.add("active");
  });
  document.addEventListener("dragleave", e => {
    if (e.relatedTarget === null)
      document.getElementById("drop-overlay").classList.remove("active");
  });
  document.addEventListener("drop", e => {
    e.preventDefault();
    document.getElementById("drop-overlay").classList.remove("active");
    const pdfs = [...e.dataTransfer.files].filter(f => f.name.endsWith(".pdf"));
    addFiles(pdfs);
  });

  function addFiles(fileList) {
    fileList.forEach(file => {
      if (files.find(f => f.name === file.name)) return;
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result.split(",")[1];
        files.push({ name: file.name, data: base64, markdown: null, status: "pending" });
        renderList();
        updateButtons();
      };
      reader.readAsDataURL(file);
    });
  }

  // ── List rendering ────────────────────────────────────────────────
  function renderList() {
    const ul = document.getElementById("file-list");
    ul.innerHTML = "";
    files.forEach((f, i) => {
      const li = document.createElement("li");
      li.className = f.status === "done" ? "done" : f.status === "error" ? "error" : "";
      if (i === selected) li.classList.add("active");
      li.innerHTML = `<span class="dot"></span><span title="${f.name}">${f.name}</span>`;
      li.onclick = () => selectFile(i);
      ul.appendChild(li);
    });
  }

  function selectFile(i) {
    selected = i;
    renderList();
    const f = files[i];
    document.getElementById("preview-header").textContent = f.name;
    const preview = document.getElementById("preview");
    if (f.markdown) {
      preview.textContent = f.markdown;
      preview.classList.remove("placeholder");
    } else {
      preview.textContent = "Not converted yet — click Convert All.";
      preview.classList.add("placeholder");
    }
    updateButtons();
  }

  // ── Conversion ────────────────────────────────────────────────────
  async function convertAll() {
    if (!files.length) return;
    setStatus("Converting...");
    document.getElementById("btn-convert").disabled = true;

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      setStatus(`Converting ${i + 1}/${files.length}: ${f.name}`);
      try {
        const res = await fetch("/convert", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filename: f.name, data: f.data })
        });
        const json = await res.json();
        if (!res.ok) {
          throw new Error(json.error || `Request failed with status ${res.status}`);
        }
        f.markdown = json.markdown;
        f.status = "done";
      } catch (err) {
        f.markdown = `> **Error:** ${err}`;
        f.status = "error";
      }
      if (selected === i) selectFile(i);
      renderList();
    }

    setStatus(`Done — ${files.length} file(s) converted.`);
    document.getElementById("btn-convert").disabled = false;
    updateButtons();
  }

  // ── Saving ────────────────────────────────────────────────────────
  function saveCurrent() {
    if (selected < 0 || !files[selected].markdown) return;
    const f = files[selected];
    download(f.name.replace(/\.pdf$/i, ".md"), f.markdown);
  }

  function saveAll() {
    files.filter(f => f.markdown).forEach(f => {
      download(f.name.replace(/\.pdf$/i, ".md"), f.markdown);
    });
  }

  function download(filename, text) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([text], { type: "text/markdown" }));
    a.download = filename;
    a.click();
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function updateButtons() {
    const hasFiles = files.length > 0;
    const hasCurrent = selected >= 0 && files[selected]?.markdown;
    const hasAny = files.some(f => f.markdown);
    document.getElementById("btn-convert").disabled = !hasFiles;
    document.getElementById("btn-save").disabled = !hasCurrent;
    document.getElementById("btn-save-all").disabled = !hasAny;
    document.getElementById("btn-clear").disabled = !hasFiles;
  }

  function clearFiles() {
    files.length = 0;
    selected = -1;
    renderList();
    document.getElementById("preview").textContent = "Select a file and click Convert All to see the markdown preview.";
    document.getElementById("preview").classList.add("placeholder");
    document.getElementById("preview-header").textContent = "No file selected";
    setStatus("Add PDF files to get started.");
    updateButtons();
  }

  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }
</script>
</body>
</html>
